<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>List of Donors</title>
  <link rel="icon" type="image/png" href="../favicon.png">

  <link href="https://unpkg.com/lucide-static@latest/font/lucide.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/signup.css">
  <link rel="stylesheet" href="../css/donors.css">
</head>

<body>
  <div id="header"></div>

  <section class="donor-admin-section">
    <div class="donor-header">
      <h1>List of Donors</h1>
      <p>Upload, save, search and manage donor details.</p>

      <input
        type="text"
        id="donorSearchInput"
        class="donor-search"
        placeholder="Search Here"
      />
    </div>

    <div class="donor-grid" id="donorGrid"></div>
  </section>

  <input type="file" id="donorPhotoInput" accept="image/*" hidden />

  <script src="../config.js"></script>
  <script src="../js/header.js"></script>
  <script src="../js/donors.js"></script>
</body>
</html>
