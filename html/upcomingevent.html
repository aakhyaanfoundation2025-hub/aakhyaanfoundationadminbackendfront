<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aakhyaan Foundation</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <link href="https://unpkg.com/lucide-static@latest/font/lucide.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/signup.css">
    <link rel="stylesheet" href="../css/upcomingevent.css">
</head>


<body>

    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "../index.html";
        }
    </script>

    <div id="header"></div>

    <section class="event-hero">
        <div class="event-overlay"></div>

        <div class="event-hero-content">
            <p class="event-label">Upcoming Event</p>

            <div class="moving-wrapper">
                <div class="moving-track" id="headlineMarquee">
                    No upcoming event added yet
                </div>
            </div>

            <div class="moving-wrapper location-moving">
                <div class="moving-track slow" id="locationMarquee">
                    Location will appear here
                </div>
            </div>
        </div>
    </section>

    <section class="event-admin-section">
        <div class="event-container">

            <div class="admin-left admin-card">
                <h2>Event Location</h2>
                <p>Add or delete the upcoming event location from here.</p>

                <div class="detail-box">
                    <label>Location</label>
                    <div class="input-action">
                        <textarea id="locationInput" placeholder="Enter event location"></textarea>
                        <button id="locationBtn" class="action-btn save">
                            <i class="fa-solid fa-floppy-disk"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="admin-right admin-card">
                <div class="right-head">
                    <div>
                        <h2>Upcoming Events</h2>
                        <p>Add multiple upcoming event headlines.</p>
                    </div>

                    <button class="add-event-btn" id="addEventBtn">
                        <i class="fa-solid fa-plus"></i>
                        Add Event
                    </button>
                </div>

                <div class="event-list" id="eventList"></div>
            </div>

        </div>
    </section>

    <div id="footer"></div>
    <div id="floating-icons"></div>

    <script src="../config.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/login.js"></script>
    <script src="../js/signup.js"></script>
    <script src="../js/upcomingevent.js"></script>

</body>

</html>
